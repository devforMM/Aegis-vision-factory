<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Admin Registration - Aegis Vision</title>
</head>

<body>
    <main class="login-container">
        <article class="login-box">
            <div class="login-header">
                <img src="/images/logo.png" alt="AEGIS VISION Logo" class="logo">
                <h2 style="color: var(--accent-warning);"><i class="fas fa-user-shield"></i> Admin Registration</h2>
                <p>Create a new administrator account</p>
            </div>

            <form method="POST" action="/factory/admin/register">
                <input type="text" name="last_name" placeholder="Last Name" required>
                <input type="text" name="first_name" placeholder="First Name" required>
                <input type="email" name="email" placeholder="Email" required>
                <input type="tel" name="phone_number" placeholder="Phone Number" required>
                <input type="text" name="address" placeholder="Address" required>
                <input type="number" name="age" placeholder="Age" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit"><i class="fas fa-user-plus"></i> Register</button>
            </form>

            <p style="text-align: center; margin-top: 20px; color: var(--text-muted);">
                <a href="/factory/admin/login" style="color: var(--accent-warning); font-weight: 600;">Back to Login</a>
            </p>
        </article>
    </main>
</body>
</html>
