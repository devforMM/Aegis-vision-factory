<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Admin Login - Aegis Vision</title>
</head>
<body>
    <main class="login-container">
        <article class="login-box">
            <div class="login-header">
                <img src="/images/logo.png" alt="AEGIS VISION Logo" class="logo">
                <h2 style="color: var(--accent-warning);">AEGIS VISION</h2>
                <p>Industrial Safety Surveillance System</p>
            </div>
            
            <form action="/factory/admin/login" method="POST">
                <input type="email" name="email" placeholder="Email Address" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit"><i class="fas fa-sign-in-alt"></i> Login</button>
            </form>
            {% if error %}
                <p style="color:red;">
                    {{ error }}
                </p>
            {% endif %}

            <p style="text-align: center; margin-top: 20px; color: var(--text-muted); font-size: 14px;">
                Don't have an account yet? <a href="/factory/admin/register" style="color: var(--accent-warning); font-weight: 600;">Register here</a>
            </p>
        </article>
    </main>
</body>
</html>
